<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Створення акаунту</h1>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="name">Ім'я *</label>
          <input id="name" name="name" type="text" />
          <p class="error" id="error-name"></p>
        </div>

        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" />
          <p class="error" id="error-email"></p>
        </div>

        <div class="field">
          <label for="password">Пароль *</label>
          <input id="password" name="password" type="password" />
          <p class="error" id="error-password"></p>
          <p class="hint">Мінімум 8 символів, одна велика літера, одна цифра</p>
        </div>

        <div class="field">
          <label for="passwordConfirm">Повторіть пароль *</label>
          <input id="passwordConfirm" name="passwordConfirm" type="password" />
          <p class="error" id="error-passwordConfirm"></p>
        </div>

        <div class="field">
          <label for="age">Вік (необов'язково)</label>
          <input id="age" name="age" type="number" />
          <p class="error" id="error-age"></p>
        </div>

        <div class="field checkbox">
          <label>
            <input id="terms" name="terms" type="checkbox" />
            Я погоджуюсь з умовами використання *
          </label>
          <p class="error" id="error-terms"></p>
        </div>

        <button type="submit" id="submit">Зареєструватись</button>
      </form>

      <div id="success" class="success hidden">
        <h2>✅ Реєстрація успішна!</h2>
        <p>Раді тебе бачити в нашій спільноті.</p>
      </div>
    </main>
  </body>
</html>
