<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <title>Реєстрація</title>
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1>Створення акаунту</h1>

      <form id="registerForm" novalidate>
        <div class="field">
          <label for="email">Email *</label>
          <input id="email" name="email" type="email" />
          <p class="error" id="error-email"></p>
        </div>

        <div class="field">
          <label for="password"
            >Пароль * <span id="visibilyti-password">👁</span></label
          >
          <input id="password" name="password" type="password" />
          <p class="error" id="error-password"></p>
          <p class="indicator" id="indicator-password"></p>
          <p class="hint">Мінімум 8 символів, одна велика літера, одна цифра</p>
        </div>

        <button type="submit" id="submit">Увійти</button> 
      </form>

      <div id="success" class="success hidden">
        <h2>✅ Логін успішний!</h2>
        <p>Раді тебе бачити в нашій спільноті.</p>
      </div>
    </main>
  </body>
</html>
