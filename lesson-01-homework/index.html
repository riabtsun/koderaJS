<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Таке підключення дозволяє завантажувати скрипт одразу і виконувати його після завантаження HTML, але перед DOMContentLoaded -->
    <script src="script1.js" defer></script>  
    <!-- Таке підключення виконує скрипт негайно, що може призвести до помилки, якщо DOM ще не завантажений -->
    <script src="script2.js"></script> 
    <title>Document</title>
  </head>
  <body>
    <!-- Таке підключення виконує скрипт після завантаження всього HTML, що гарантує доступ до DOM -->
    <script src="script3.js"></script>  
  </body>
</html>
